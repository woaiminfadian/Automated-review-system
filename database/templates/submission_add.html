{% extends "base.html" %}
{% block title %}录入新稿件{% endblock %}
{% block content %}
<div class="page-header">
    <h4>录入新稿件</h4>
    <a href="{{ url_for('submissions_list') }}" class="text-muted text-decoration-none fs-small">← 返回稿件列表</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">稿件标题 <span class="text-danger">*</span></label>
                    <input type="text" name="title" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">学科方向 <span class="text-danger">*</span></label>
                    <select name="field" class="form-select" required>
                        <option value="">请选择</option>
                        {% for f in fields %}
                        <option value="{{ f }}">{{ f }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">来稿性质</label>
                    <select name="submission_type" class="form-select">
                        <option value="正常来稿">正常来稿</option>
                        <option value="专栏来稿">专栏来稿</option>
                        <option value="协助审稿">协助审稿</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">收稿日期</label>
                    <input type="text" name="received_date" class="form-control" placeholder="YYYY.MM.DD (默认今天)" value="{{ request.form.get('received_date', '') }}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">初始状态</label>
                    <select name="status" class="form-select">
                        <option value="待处理">待处理</option>
                        {% for s in statuses %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
                    </select>
                </div>
            </div>

            <hr>
            <h6 class="fw-bold">第一作者 <span class="text-danger">*</span></h6>
            <div class="row g-2 mb-2">
                <div class="col-auto">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="author1_select" value="existing" checked onchange="toggleAuthor1()">
                        <label class="form-check-label">已有作者</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="author1_select" value="new" onchange="toggleAuthor1()">
                        <label class="form-check-label">新建作者</label>
                    </div>
                </div>
            </div>
            <div id="author1_existing" class="row g-2">
                <div class="col-md-6">
                    <select name="author1_id" class="form-select">
                        <option value="">请选择</option>
                        {% for a in authors %}
                        <option value="{{ a.id }}">{{ a.name }} ({{ a.affiliation or '未知单位' }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div id="author1_new" class="row g-2 d-none">
                <div class="col-md-3"><input type="text" name="author1_name" class="form-control" placeholder="姓名"></div>
                <div class="col-md-3"><input type="text" name="author1_email" class="form-control" placeholder="邮箱"></div>
                <div class="col-md-3"><input type="text" name="author1_phone" class="form-control" placeholder="电话"></div>
                <div class="col-md-3"><input type="text" name="author1_affiliation" class="form-control" placeholder="学校/单位"></div>
                <div class="col-md-3 mt-2"><input type="text" name="author1_grade" class="form-control" placeholder="身份(硕士/博士/教师)"></div>
            </div>

            <hr>
            <h6 class="fw-bold">第二作者 <span class="text-muted fs-small fw-normal">（可选）</span></h6>
            <div class="mb-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="hasAuthor2" name="has_author2" value="yes" onchange="toggleAuthor2()">
                    <label class="form-check-label" for="hasAuthor2">有第二作者</label>
                </div>
            </div>
            <div id="author2_section" class="d-none">
                <div class="row g-2 mb-2">
                    <div class="col-auto">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="author2_select" value="existing" checked onchange="toggleAuthor2Mode()">
                            <label class="form-check-label">已有作者</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="author2_select" value="new" onchange="toggleAuthor2Mode()">
                            <label class="form-check-label">新建</label>
                        </div>
                    </div>
                </div>
                <div id="author2_existing" class="row g-2">
                    <div class="col-md-6">
                        <select name="author2_id" class="form-select">
                            <option value="">请选择</option>
                            {% for a in authors %}
                            <option value="{{ a.id }}">{{ a.name }} ({{ a.affiliation or '未知单位' }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div id="author2_new" class="row g-2 d-none">
                    <div class="col-md-3"><input type="text" name="author2_name" class="form-control" placeholder="姓名"></div>
                    <div class="col-md-3"><input type="text" name="author2_email" class="form-control" placeholder="邮箱"></div>
                    <div class="col-md-3"><input type="text" name="author2_phone" class="form-control" placeholder="电话"></div>
                    <div class="col-md-3"><input type="text" name="author2_affiliation" class="form-control" placeholder="学校/单位"></div>
                    <div class="col-md-3 mt-2"><input type="text" name="author2_grade" class="form-control" placeholder="身份(硕士/博士/教师)"></div>
                </div>
            </div>

            <hr>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> 保存稿件</button>
                <a href="{{ url_for('submissions_list') }}" class="btn btn-outline-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function toggleAuthor1() {
    const v = document.querySelector('input[name="author1_select"]:checked').value;
    document.getElementById('author1_existing').classList.toggle('d-none', v !== 'existing');
    document.getElementById('author1_new').classList.toggle('d-none', v !== 'new');
}
function toggleAuthor2() {
    const checked = document.getElementById('hasAuthor2').checked;
    document.getElementById('author2_section').classList.toggle('d-none', !checked);
}
function toggleAuthor2Mode() {
    const v = document.querySelector('input[name="author2_select"]:checked').value;
    document.getElementById('author2_existing').classList.toggle('d-none', v !== 'existing');
    document.getElementById('author2_new').classList.toggle('d-none', v !== 'new');
}
</script>
{% endblock %}
