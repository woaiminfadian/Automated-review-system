{% extends "base.html" %}
{% block title %}删除作者{% endblock %}
{% block content %}
<div class="page-header">
    <h4>删除作者</h4>
    <a href="{{ url_for('authors_list') }}" class="text-muted text-decoration-none fs-small">← 返回作者列表</a>
</div>

<div class="card">
    <div class="card-body text-center py-5">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size:48px"></i>
        <h5 class="mt-3">确认删除此作者？</h5>
        <p class="text-muted">
            作者 <strong>#{{ author.id }} — {{ author.name or '无姓名' }}</strong>
            {% if author.affiliation %}({{ author.affiliation }}){% endif %}<br>
            此操作不可恢复。
        </p>
        <form method="POST" class="d-inline">
            <div class="d-flex gap-2 justify-content-center">
                <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> 确认删除</button>
                <a href="{{ url_for('authors_list') }}" class="btn btn-outline-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
