{% extends "base.html" %}
{% block title %}修改密码{% endblock %}
{% block content %}
<div class="page-header">
    <h4>修改密码</h4>
    <a href="{{ url_for('editor_dashboard') }}" class="text-muted text-decoration-none fs-small">← 返回我的审稿</a>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">修改登录密码</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">当前密码</label>
                        <input type="password" name="old_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新密码</label>
                        <input type="password" name="new_password" class="form-control" placeholder="至少 4 位" required minlength="4">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认新密码</label>
                        <input type="password" name="confirm_password" class="form-control" placeholder="再次输入新密码" required minlength="4">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4"><i class="bi bi-check-lg"></i> 确认修改</button>
                        <a href="{{ url_for('editor_dashboard') }}" class="btn btn-outline-secondary px-4">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
