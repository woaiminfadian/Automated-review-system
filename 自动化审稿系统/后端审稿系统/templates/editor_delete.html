{% extends "base.html" %}
{% block title %}删除编辑{% endblock %}
{% block content %}
<div class="page-header">
    <h4>删除编辑</h4>
    <a href="{{ url_for('editors_list') }}" class="text-muted text-decoration-none fs-small">← 返回编辑列表</a>
</div>

<div class="card">
    <div class="card-body text-center py-5">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size:48px"></i>
        <h5 class="mt-3">确认删除此编辑？</h5>
        <p class="text-muted">
            编辑 <strong>#{{ editor.id }} — {{ editor.name or '无姓名' }}</strong>
            {% if editor.email %}({{ editor.email }}){% endif %}<br>
            此操作将同时删除该编辑的所有派稿记录，不可恢复。
        </p>
        <form method="POST" class="d-inline">
            <div class="d-flex gap-2 justify-content-center">
                <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> 确认删除</button>
                <a href="{{ url_for('editors_list') }}" class="btn btn-outline-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
