{% extends "base.html" %}
{% block title %}删除稿件{% endblock %}
{% block content %}
<div class="page-header">
    <h4>删除稿件</h4>
    <a href="{{ url_for('submission_detail', sid=sub.id) }}" class="text-muted text-decoration-none fs-small">← 返回稿件详情</a>
</div>

<div class="card">
    <div class="card-body text-center py-5">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size:48px"></i>
        <h5 class="mt-3">确认删除此稿件？</h5>
        <p class="text-muted">
            稿件 <strong>#{{ sub.id }} — {{ sub.title or '无标题' }}</strong><br>
            此操作将同时删除该稿件的所有派稿记录、审稿轮次和附件关联，不可恢复。
        </p>
        <form method="POST" class="d-inline">
            <div class="d-flex gap-2 justify-content-center">
                <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> 确认删除</button>
                <a href="{{ url_for('submission_detail', sid=sub.id) }}" class="btn btn-outline-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
