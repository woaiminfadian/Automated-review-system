{% extends "base.html" %}
{% block title %}编辑稿件 #{{ sub.id }}{% endblock %}
{% block content %}
<div class="page-header">
    <h4>编辑稿件 #{{ sub.id }}</h4>
    <a href="{{ url_for('submission_detail', sid=sub.id) }}" class="text-muted text-decoration-none fs-small">← 返回详情</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">稿件标题 <span class="text-danger">*</span></label>
                    <input type="text" name="title" class="form-control" value="{{ sub.title }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">学科方向</label>
                    <select name="field" class="form-select">
                        {% for f in fields %}
                        <option value="{{ f }}" {% if f == sub.field %}selected{% endif %}>{{ f }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">来稿性质</label>
                    <select name="submission_type" class="form-select">
                        <option value="正常来稿" {% if sub.submission_type == '正常来稿' %}selected{% endif %}>正常来稿</option>
                        <option value="专栏来稿" {% if sub.submission_type == '专栏来稿' %}selected{% endif %}>专栏来稿</option>
                        <option value="协助审稿" {% if sub.submission_type == '协助审稿' %}selected{% endif %}>协助审稿</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">收稿日期</label>
                    <input type="text" name="received_date" class="form-control" value="{{ sub.received_date }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">状态</label>
                    <select name="status" class="form-select">
                        {% for s in statuses %}
                        <option value="{{ s }}" {% if s == sub.status %}selected{% endif %}>{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">排期（期号）</label>
                    <input type="text" name="issue" class="form-control" value="{{ sub.issue or '' }}" placeholder="如: 2026年第1期">
                </div>
                <div class="col-12">
                    <label class="form-label">备注</label>
                    <textarea name="notes" class="form-control" rows="3">{{ sub.notes or '' }}</textarea>
                </div>
            </div>
            <hr>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> 保存修改</button>
                <a href="{{ url_for('submission_detail', sid=sub.id) }}" class="btn btn-outline-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
